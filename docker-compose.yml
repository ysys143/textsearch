services:
  db:
    image: pgvector/pgvector:pg18
    container_name: textsearch-pg
    restart: unless-stopped
    profiles: [core]
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dev}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4g

  # 확장 목록: pgvector 0.8.2 (arm64 native)
  # 접속 정보: host=localhost port=5432 user=postgres password=postgres dbname=dev

  python-bench:
    image: python:3.11-slim
    container_name: textsearch-python
    profiles: [core]
    volumes:
      - ./:/app
    working_dir: /app
    command: sleep infinity

  # Phase 8: Start ONE search engine at a time for fair latency comparison

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: textsearch-es
    profiles: [phase8-es]
    command: >
      bash -c "elasticsearch-plugin install --batch analysis-nori || true && exec /usr/local/bin/docker-entrypoint.sh"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 4g

  qdrant:
    image: qdrant/qdrant:v1.15.0
    container_name: textsearch-qdrant
    profiles: [phase8-qdrant]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 2g

  vespa:
    image: vespaengine/vespa:latest
    container_name: textsearch-vespa
    profiles: [phase8-vespa]
    ports:
      - "8090:8080"
      - "19071:19071"
    volumes:
      - vespadatadata:/opt/vespa/var
    deploy:
      resources:
        limits:
          memory: 4g

  # Phase 2: ParadeDB — native pg_bm25 (Tantivy-powered BM25 inside PostgreSQL)
  # Answers: "pg에서 한국어 BM25를 구현하는 최선의 방법"
  paradedb:
    image: paradedb/paradedb:latest
    container_name: textsearch-paradedb
    profiles: [phase2-paradedb]
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-dev}
    ports:
      - "5433:5432"
    volumes:
      - paradedbdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dev}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4g

  pgroonga:
    image: groonga/pgroonga:latest
    container_name: textsearch-pgroonga
    profiles: [phase2-pgroonga]
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-dev}
    ports:
      - "5435:5432"
    volumes:
      - pgroongarata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pg-phase6:
    image: tensorchord/vchord-suite:pg18-latest
    profiles:
      - phase6
    ports:
      - "5436:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dev
    command: postgres -c shared_buffers=32MB -c maintenance_work_mem=32MB -c max_parallel_maintenance_workers=0
    volumes:
      - pg_phase6_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  esdata:
  qdrantdata:
  vespadatadata:
  paradedbdata:
  pgroongarata:
  pg_phase6_data:
