services:
  db:
    image: pgvector/pgvector:pg18
    container_name: textsearch-pg
    restart: unless-stopped
    profiles: [core]
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dev}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4g

  # 확장 목록: pgvector 0.8.2 (arm64 native)
  # 접속 정보: host=localhost port=5432 user=postgres password=postgres dbname=dev

  python-bench:
    image: python:3.11-slim
    container_name: textsearch-python
    profiles: [core]
    volumes:
      - ./:/app
    working_dir: /app
    command: sleep infinity

  # Phase 5: Start ONE search engine at a time for fair latency comparison

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: textsearch-es
    profiles: [phase5-es]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 6g

  qdrant:
    image: qdrant/qdrant:latest
    container_name: textsearch-qdrant
    profiles: [phase5-qdrant]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 2g

  # Phase 2: ParadeDB — native pg_bm25 (Tantivy-powered BM25 inside PostgreSQL)
  # Answers: "pg에서 한국어 BM25를 구현하는 최선의 방법"
  paradedb:
    image: paradedb/paradedb:latest
    container_name: textsearch-paradedb
    profiles: [phase2-paradedb]
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-dev}
    ports:
      - "5433:5432"
    volumes:
      - paradedbdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dev}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4g

  pgroonga:
    image: groonga/pgroonga:latest
    container_name: textsearch-pgroonga
    profiles: [phase2-pgroonga]
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-dev}
    ports:
      - "5435:5432"
    volumes:
      - pgroongarata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional stretch goal
  vespa:
    image: vespaengine/vespa:latest
    container_name: textsearch-vespa
    profiles: [phase5-vespa]
    ports:
      - "8080:8080"
      - "19071:19071"
    volumes:
      - vespadata:/opt/vespa/var

volumes:
  pgdata:
  esdata:
  qdrantdata:
  vespadata:
  paradedbdata:
  pgroongarata:
